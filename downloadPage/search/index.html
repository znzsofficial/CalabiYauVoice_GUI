<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡拉彼丘 Wiki 搜索</title>
    <meta name="description" content="搜索卡拉彼丘 Wiki 角色、武器、活动等资料，支持实时搜索建议与智能筛选。">
    <link rel="icon" href="../icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="search.css">
    <link rel="preconnect" href="https://wiki.biligame.com" crossorigin>
</head>
<body>
    <a class="skip-link" href="#results">跳转到搜索结果</a>

    <header class="header">
        <div class="header-content">
            <a href="../" class="header-back" aria-label="返回下载页">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </a>
            <h1 class="header-title">
                <img src="../icon.svg" alt="" class="header-logo">
                卡拉彼丘 Wiki 搜索
            </h1>
            <a class="header-link" href="https://wiki.biligame.com/klbq/" target="_blank" rel="noopener noreferrer">
                访问原站
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            </a>
        </div>
    </header>

    <main class="main">
        <div class="search-box">
            <div class="search-input-wrap">
                <div class="mode-select" id="modeSelect">
                    <div class="mode-trigger" tabindex="0" role="combobox" aria-expanded="false" aria-haspopup="listbox">
                        <span class="mode-value">内容</span>
                        <svg class="mode-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                    </div>
                    <div class="mode-menu" role="listbox">
                        <div class="mode-option selected" data-value="" role="option" aria-selected="true">内容</div>
                        <div class="mode-option" data-value="intitle:" role="option" aria-selected="false">标题</div>
                        <div class="mode-option" data-value="insource:" role="option" aria-selected="false">源码</div>
                    </div>
                </div>
                <input
                    type="text"
                    id="searchInput"
                    class="search-input"
                    placeholder="搜索角色、武器、地图、技能…"
                    autocomplete="off"
                    autofocus
                >
                <button class="search-clear" id="searchClear" aria-label="清空搜索" hidden>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </button>
            </div>
            <div class="suggest-dropdown" id="suggestDropdown" role="listbox" hidden></div>
        </div>

        <div class="filters" id="filters">
            <div class="filter-group">
                <span class="filter-label">范围</span>
                <div class="chip-group" id="profileChips"></div>
            </div>
            <div class="filter-group" id="nsFilterGroup">
                <span class="filter-label">命名空间</span>
                <div class="chip-group" id="nsChips"></div>
                <button class="ns-toggle" id="nsToggle" title="展开全部命名空间">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                </button>
            </div>
            <div class="filter-group">
                <span class="filter-label">排序</span>
                <div class="chip-group" id="sortChips"></div>
            </div>
        </div>

        <div class="result-meta" id="resultMeta" hidden></div>

        <div class="results" id="results">
            <div class="placeholder">
                <div class="placeholder-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                </div>
                <p>输入关键词开始搜索卡拉彼丘 Wiki</p>
            </div>
        </div>

        <div class="pagination" id="pagination" hidden></div>
    </main>

    <footer class="footer">
        <p>数据来源：<a href="https://wiki.biligame.com/klbq/" target="_blank" rel="noopener noreferrer">卡拉彼丘 Wiki</a> · Powered by MediaWiki API</p>
    </footer>

    <div class="lightbox" id="lightbox" hidden>
        <div class="lightbox-backdrop"></div>
        <div class="lightbox-container">
            <img class="lightbox-img" id="lightboxImg" src="" alt="">
            <div class="lightbox-loading" id="lightboxLoading">
                <div class="lightbox-spinner"></div>
            </div>
        </div>
        <button class="lightbox-close" id="lightboxClose" aria-label="关闭">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
    </div>

    <script>
    (() => {
        const API = "https://wiki.biligame.com/klbq/api.php";
        const WIKI_BASE = "https://wiki.biligame.com/klbq/";
        const DEBOUNCE_MS = 300;
        const SUGGEST_LIMIT = 8;
        const PAGE_SIZE = 20;

        const PROFILES = [
            { value: "default", name: "默认", desc: "主命名空间" },
            { value: "images", name: "图片", desc: "文件命名空间" },
            { value: "all", name: "全部", desc: "所有命名空间" },
            { value: "advanced", name: "高级", desc: "自选命名空间" },
        ];

        const NS_PRIMARY = [
            { id: 0, name: "条目" },
            { id: 6, name: "文件" },
            { id: 14, name: "分类" },
            { id: 10, name: "模板" },
            { id: 828, name: "模块" },
            { id: 4, name: "项目" },
            { id: 2, name: "用户" },
        ];

        const NS_EXTENDED = [
            { id: 0, name: "条目" },
            { id: 1, name: "讨论" },
            { id: 2, name: "用户" },
            { id: 3, name: "用户讨论" },
            { id: 4, name: "卡拉彼丘" },
            { id: 5, name: "卡拉彼丘讨论" },
            { id: 6, name: "文件" },
            { id: 7, name: "文件讨论" },
            { id: 8, name: "MediaWiki" },
            { id: 9, name: "MediaWiki讨论" },
            { id: 10, name: "模板" },
            { id: 11, name: "模板讨论" },
            { id: 12, name: "帮助" },
            { id: 13, name: "帮助讨论" },
            { id: 14, name: "分类" },
            { id: 15, name: "分类讨论" },
            { id: 102, name: "属性" },
            { id: 103, name: "属性讨论" },
            { id: 106, name: "表单" },
            { id: 107, name: "表单讨论" },
            { id: 108, name: "概念" },
            { id: 109, name: "概念讨论" },
            { id: 112, name: "smw/schema" },
            { id: 113, name: "smw/schema talk" },
            { id: 114, name: "Rule" },
            { id: 115, name: "Rule talk" },
            { id: 274, name: "Widget" },
            { id: 275, name: "Widget talk" },
            { id: 828, name: "模块" },
            { id: 829, name: "模块讨论" },
            { id: 2300, name: "Topic" },
        ];

        const nsNameMap = Object.fromEntries(NS_EXTENDED.map(ns => [ns.id, ns.name]));

        const PROFILE_NS_MAP = {
            default: [0],
            images: [6],
            all: NS_EXTENDED.map(ns => ns.id),
        };

        const SORT_OPTIONS = [
            { value: "relevance", name: "相关度" },
            { value: "last_edit_desc", name: "最近编辑" },
            { value: "last_edit_asc", name: "最早编辑" },
            { value: "create_timestamp_desc", name: "最新创建" },
            { value: "incoming_links_desc", name: "最多链接" },
        ];

        // State
        let query = "";
        let activeProfile = "default";
        let selectedNS = new Set([0]);
        let nsExpanded = false;
        let activeSort = "relevance";
        let currentPage = 1;
        let totalHits = 0;
        let searchTimer = null;
        let suggestIdx = -1;
        let lastSearchQuery = "";

        // DOM
        const input = document.getElementById("searchInput");
        const clearBtn = document.getElementById("searchClear");
        const modeSelect = document.getElementById("modeSelect");
        const modeTrigger = modeSelect?.querySelector(".mode-trigger");
        const modeMenu = modeSelect?.querySelector(".mode-menu");
        const modeValue = modeSelect?.querySelector(".mode-value");
        const dropdown = document.getElementById("suggestDropdown");
        const results = document.getElementById("results");
        const resultMeta = document.getElementById("resultMeta");
        const pagination = document.getElementById("pagination");
        const profileChips = document.getElementById("profileChips");
        const nsChips = document.getElementById("nsChips");
        const nsToggle = document.getElementById("nsToggle");
        const nsFilterGroup = document.getElementById("nsFilterGroup");
        const sortChips = document.getElementById("sortChips");

        // ── Profile chips ──
        function renderProfileChips() {
            profileChips.innerHTML = "";
            PROFILES.forEach(p => {
                const chip = document.createElement("button");
                chip.className = "chip" + (p.value === activeProfile ? " active" : "");
                chip.textContent = p.name;
                chip.title = p.desc;
                chip.addEventListener("click", () => {
                    activeProfile = p.value;
                    if (p.value !== "advanced") {
                        selectedNS = new Set(PROFILE_NS_MAP[p.value]);
                        nsExpanded = false;
                    }
                    currentPage = 1;
                    renderProfileChips();
                    renderNSChips();
                    if (nsFilterGroup) nsFilterGroup.style.display = p.value === "advanced" ? "" : "none";
                    if (query.trim()) doSearch();
                });
                profileChips.appendChild(chip);
            });
        }

        // ── Namespace chips ──
        function renderNSChips() {
            nsChips.innerHTML = "";
            const list = nsExpanded ? NS_EXTENDED : NS_PRIMARY;
            const allChecked = list.every(ns => selectedNS.has(ns.id));

            const allChip = document.createElement("button");
            allChip.className = "chip" + (allChecked ? " active" : "");
            allChip.textContent = "全选";
            allChip.addEventListener("click", () => {
                if (allChecked) {
                    list.forEach(ns => selectedNS.delete(ns.id));
                } else {
                    list.forEach(ns => selectedNS.add(ns.id));
                }
                currentPage = 1;
                renderNSChips();
                if (query.trim()) doSearch();
            });
            nsChips.appendChild(allChip);

            list.forEach(ns => {
                const chip = document.createElement("button");
                chip.className = "chip" + (selectedNS.has(ns.id) ? " active" : "");
                chip.textContent = ns.name;
                chip.addEventListener("click", () => {
                    if (selectedNS.has(ns.id)) {
                        selectedNS.delete(ns.id);
                    } else {
                        selectedNS.add(ns.id);
                    }
                    currentPage = 1;
                    renderNSChips();
                    if (query.trim()) doSearch();
                });
                nsChips.appendChild(chip);
            });

            nsToggle.innerHTML = nsExpanded
                ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>'
                : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>';
        }

        nsToggle.addEventListener("click", () => {
            nsExpanded = !nsExpanded;
            renderNSChips();
        });

        // ── Sort chips ──
        function renderSortChips() {
            sortChips.innerHTML = "";
            SORT_OPTIONS.forEach(opt => {
                const chip = document.createElement("button");
                chip.className = "chip" + (opt.value === activeSort ? " active" : "");
                chip.textContent = opt.name;
                chip.addEventListener("click", () => {
                    activeSort = opt.value;
                    currentPage = 1;
                    renderSortChips();
                    if (query.trim()) doSearch();
                });
                sortChips.appendChild(chip);
            });
        }

        let searchModePrefix = "";

        // ── Mode select ──
        let modeOpen = false;
        function toggleMode() {
            if (!modeSelect) return;
            modeOpen = !modeOpen;
            modeSelect.classList.toggle("open", modeOpen);
            modeTrigger?.setAttribute("aria-expanded", modeOpen);
        }
        function closeMode() {
            if (!modeSelect) return;
            modeOpen = false;
            modeSelect.classList.remove("open");
            modeTrigger?.setAttribute("aria-expanded", "false");
        }
        modeTrigger?.addEventListener("click", (e) => { e.stopPropagation(); toggleMode(); });
        modeTrigger?.addEventListener("keydown", (e) => {
            if (e.key === "Enter" || e.key === " ") { e.preventDefault(); toggleMode(); }
            if (e.key === "Escape") closeMode();
        });
        modeMenu?.querySelectorAll(".mode-option").forEach(opt => {
            opt.addEventListener("click", (e) => {
                e.stopPropagation();
                searchModePrefix = opt.dataset.value;
                if (modeValue) modeValue.textContent = opt.textContent;
                modeMenu.querySelectorAll(".mode-option").forEach(o => {
                    const sel = o === opt;
                    o.classList.toggle("selected", sel);
                    o.setAttribute("aria-selected", sel);
                });
                closeMode();
                input?.focus();
            });
        });
        document.addEventListener("click", (e) => {
            if (modeSelect && !modeSelect.contains(e.target)) closeMode();
        });

        function getSearchQuery() {
            const q = query.trim();
            if (!q) return "";
            if (q.startsWith("intitle:") || q.startsWith("insource:")) return q;
            return searchModePrefix + q;
        }

        // ── 搜索建议 ──
        async function fetchSuggestions(q) {
            if (!q.trim()) {
                hideDropdown();
                return;
            }
            try {
                const nsParam = activeProfile === "advanced"
                    ? [...selectedNS].join("|")
                    : PROFILE_NS_MAP[activeProfile].join("|");
                const sq = getSearchQuery();
                const params = new URLSearchParams({
                    action: "opensearch",
                    search: sq,
                    limit: SUGGEST_LIMIT,
                    namespace: nsParam || "0",
                    format: "json",
                });
                const resp = await fetchWithTimeout(`${API}?${params}`, {}, 5000);
                if (!resp.ok) return;
                const data = await resp.json();
                const titles = data[1] || [];
                const descs = data[2] || [];
                const urls = data[3] || [];
                if (titles.length === 0) {
                    hideDropdown();
                    return;
                }
                showSuggestions(titles, descs, urls);
            } catch {
                hideDropdown();
            }
        }

        function showSuggestions(titles, descs, urls) {
            suggestIdx = -1;
            dropdown.innerHTML = titles.map((t, i) => `
                <div class="suggest-item" role="option" data-title="${esc(t)}" data-url="${esc(urls[i] || "")}">
                    <svg class="suggest-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    <div class="suggest-text">
                        <span class="suggest-title">${highlightMatch(esc(t), query)}</span>
                        ${descs[i] ? `<span class="suggest-desc">${esc(truncate(descs[i], 60))}</span>` : ""}
                    </div>
                </div>
            `).join("");
            dropdown.hidden = false;

            dropdown.querySelectorAll(".suggest-item").forEach((item, idx) => {
                item.addEventListener("click", () => {
                    const title = item.dataset.title;
                    input.value = title;
                    query = title;
                    hideDropdown();
                    doSearch();
                });
                item.addEventListener("mouseenter", () => {
                    setSuggestHighlight(idx);
                });
            });
        }

        function hideDropdown() {
            dropdown.hidden = true;
            suggestIdx = -1;
        }

        function setSuggestHighlight(idx) {
            const items = dropdown.querySelectorAll(".suggest-item");
            items.forEach((el, i) => el.classList.toggle("highlighted", i === idx));
            suggestIdx = idx;
            if (items[idx]) {
                input.value = items[idx].dataset.title;
            }
        }

        // ── 搜索 ──
        function getActiveNSParam() {
            if (activeProfile === "advanced") {
                const ns = [...selectedNS].filter(id => id >= 0);
                return ns.length > 0 ? ns.join("|") : "0";
            }
            return PROFILE_NS_MAP[activeProfile].join("|");
        }

        function httpErrorMessage(status) {
            const map = {
                400: "请求参数有误",
                403: "访问被拒绝，可能被反爬限制",
                404: "Wiki API 接口不存在",
                429: "请求过于频繁，请稍后再试",
                500: "Wiki 服务器内部错误",
                502: "Wiki 服务器网关异常",
                503: "Wiki 服务暂时不可用",
                504: "Wiki 服务器响应超时",
            };
            return map[status] || `HTTP ${status} 错误`;
        }

        function apiErrorMessage(data) {
            const err = data?.errors?.[0];
            if (!err) return null;
            const codeMap = {
                "search-title-disabled": "当前命名空间不支持搜索",
                "search-text-disabled": "全文搜索未启用",
                "toomanyconcurrent": "并发请求过多，请稍后再试",
                "ratelimited": "请求频率受限，请稍后再试",
            };
            return codeMap[err.code] || err.info || err.code || "接口返回错误";
        }

        async function doSearch() {
            const q = query.trim();
            if (!q) return;
            lastSearchQuery = q;
            hideDropdown();
            results.innerHTML = skeletonHTML(5);
            resultMeta.hidden = true;
            pagination.hidden = true;

            try {
                const sq = getSearchQuery();
                const params = new URLSearchParams({
                    action: "query",
                    list: "search",
                    srsearch: sq,
                    srlimit: PAGE_SIZE,
                    sroffset: (currentPage - 1) * PAGE_SIZE,
                    srnamespace: getActiveNSParam(),
                    srinfo: "totalhits|suggestion",
                    srprop: "snippet|timestamp|wordcount|sectiontitle|redirecttitle|size",
                    srsort: activeSort,
                    format: "json",
                    origin: "*",
                });
                const resp = await fetchWithTimeout(`${API}?${params}`, {}, 10000);
                if (!resp.ok) throw new Error(httpErrorMessage(resp.status));

                let data;
                try {
                    data = await resp.json();
                } catch {
                    throw new Error("接口返回数据格式异常");
                }

                const apiErr = apiErrorMessage(data);
                if (apiErr) throw new Error(apiErr);

                const search = data.query?.search || [];
                const info = data.query?.searchinfo || {};
                totalHits = info.totalhits || 0;

                if (search.length === 0) {
                    const suggestion = info.suggestion;
                    results.innerHTML = emptyHTML(q, suggestion);
                    resultMeta.hidden = true;
                    pagination.hidden = true;
                    return;
                }

                resultMeta.hidden = false;
                resultMeta.innerHTML = `找到 <strong>${totalHits.toLocaleString()}</strong> 条结果${info.suggestion ? ` · 你是不是要搜：<button class="suggestion-link" data-title="${esc(info.suggestion)}">${esc(info.suggestion)}</button>` : ""}`;

                if (info.suggestion) {
                    resultMeta.querySelector(".suggestion-link")?.addEventListener("click", (e) => {
                        input.value = e.target.dataset.title;
                        query = e.target.dataset.title;
                        currentPage = 1;
                        doSearch();
                    });
                }

                const titles = search.map(r => r.title);
                const nsMap = Object.fromEntries(search.map(r => [r.title, r.ns]));
                const [images, extra] = await Promise.all([
                    fetchPageImages(titles, nsMap),
                    fetchPageExtra(titles),
                ]);

                results.innerHTML = search.map((r, i) => {
                    const img = images[r.title];
                    const ext = extra[r.title] || {};
                    const date = new Date(r.timestamp);
                    const dateStr = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`;
                    const url = WIKI_BASE + encodeURIComponent(r.title.replace(/ /g, "_"));
                    const nsName = nsNameMap[r.ns] || "";
                    const sizeKB = r.size ? (r.size / 1024).toFixed(1) : "";
                    const categories = ext.categories || [];
                    return `
                        <a class="result-card" href="${esc(url)}" target="_blank" rel="noopener noreferrer" style="animation-delay: ${i * 0.03}s">
                            ${img ? `<div class="result-thumb" data-full="${esc(img.full)}"><img src="${esc(img.thumb)}" alt="" loading="lazy"></div>` : ""}
                            <div class="result-body">
                                <div class="result-title-row">
                                    ${nsName ? `<span class="result-ns">${esc(nsName)}</span>` : ""}
                                    <h3 class="result-title">${highlightMatch(esc(r.title), q)}</h3>
                                </div>
                                ${r.redirecttitle ? `<div class="result-redirect">重定向自：<span>${highlightMatch(esc(r.redirecttitle), q)}</span></div>` : ""}
                                ${r.sectiontitle ? `<span class="result-section">§ ${esc(r.sectiontitle)}</span>` : ""}
                                <p class="result-snippet">${cleanSnippet(r.snippet)}</p>
                                <div class="result-meta-row">
                                    <span title="最后编辑">${dateStr}</span>
                                    ${r.wordcount ? `<span title="字数">${r.wordcount.toLocaleString()} 字</span>` : ""}
                                    ${sizeKB ? `<span title="页面大小">${sizeKB} KB</span>` : ""}
                                </div>
                                ${categories.length > 0 ? `<div class="result-cats">${categories.slice(0, 3).map(c => `<span class="cat-tag">${esc(c)}</span>`).join("")}</div>` : ""}
                            </div>
                        </a>
                    `;
                }).join("");

                renderPagination();
            } catch (err) {
                const msg = err.name === "AbortError"
                    ? "搜索请求超时，请检查网络或换个关键词重试"
                    : err.message || "搜索出错，请稍后重试";
                results.innerHTML = errorHTML(msg);
                resultMeta.hidden = true;
                pagination.hidden = true;
                document.getElementById("retryBtn")?.addEventListener("click", () => doSearch());
            }
        }

        async function fetchPageImages(titles, nsMap) {
            if (titles.length === 0) return {};
            const result = {};

            // 1. pageimages API — thumbnail only, need to get full via imageinfo
            const piThumbs = {};
            try {
                const params = new URLSearchParams({
                    action: "query",
                    prop: "pageimages",
                    piprop: "thumbnail",
                    pithumbnail: 120,
                    pilicense: "any",
                    titles: titles.join("|"),
                    format: "json",
                    origin: "*",
                });
                const resp = await fetchWithTimeout(`${API}?${params}`, {}, 8000);
                const data = await resp.json();
                for (const p of Object.values(data.query?.pages || {})) {
                    if (p.thumbnail?.source) {
                        piThumbs[p.title] = p.thumbnail.source;
                    }
                }
            } catch {}

            // 2. For file namespace pages, use imageinfo for both thumb and full
            const fileTitles = titles.filter(t => nsMap[t] === 6);
            if (fileTitles.length > 0) {
                try {
                    const filePageNames = fileTitles.map(t => "File:" + t.replace(/^文件:/, ""));
                    const params = new URLSearchParams({
                        action: "query",
                        prop: "imageinfo",
                        iiprop: "url",
                        iiurlwidth: 120,
                        titles: filePageNames.join("|"),
                        format: "json",
                        origin: "*",
                    });
                    const resp = await fetchWithTimeout(`${API}?${params}`, {}, 8000);
                    const data = await resp.json();
                    for (const p of Object.values(data.query?.pages || {})) {
                        const info = p.imageinfo?.[0];
                        if (info) {
                            const origTitle = p.title.replace(/^文件:/, "");
                            result[origTitle] = { thumb: info.thumburl || info.url, full: info.url };
                            result[p.title] = result[origTitle];
                        }
                    }
                } catch {}
            }

            // 3. For remaining pages, extract first image from wikitext
            const missingTitles = titles.filter(t => !result[t] && (nsMap[t] === 0 || nsMap[t] === 14));
            if (missingTitles.length > 0) {
                try {
                    const batch = missingTitles.slice(0, 10);
                    const params = new URLSearchParams({
                        action: "query",
                        prop: "revisions",
                        rvprop: "content",
                        rvslots: "main",
                        titles: batch.join("|"),
                        format: "json",
                        origin: "*",
                    });
                    const resp = await fetchWithTimeout(`${API}?${params}`, {}, 8000);
                    const data = await resp.json();
                    for (const p of Object.values(data.query?.pages || {})) {
                        const content = p.revisions?.[0]?.slots?.main?.["*"] || "";
                        const m = content.match(/\[\[(?:文件|File):([^|\]\]]+)/i);
                        if (m) {
                            const fullUrl = WIKI_BASE + "Special:Redirect/file/" + encodeURIComponent(m[1].trim());
                            result[p.title] = { thumb: fullUrl, full: fullUrl };
                        }
                    }
                } catch {}
            }

            // 4. For pages with only pageimages thumb, get full URL via imageinfo
            const needFull = titles.filter(t => !result[t] && piThumbs[t]);
            if (needFull.length > 0) {
                try {
                    const params = new URLSearchParams({
                        action: "query",
                        prop: "imageinfo",
                        iiprop: "url",
                        titles: needFull.map(t => t.replace(/^文件:/, "File:")).join("|"),
                        format: "json",
                        origin: "*",
                    });
                    const resp = await fetchWithTimeout(`${API}?${params}`, {}, 8000);
                    const data = await resp.json();
                    for (const p of Object.values(data.query?.pages || {})) {
                        const info = p.imageinfo?.[0];
                        if (info) {
                            const origTitle = p.title.replace(/^文件:/, "");
                            result[origTitle] = { thumb: piThumbs[origTitle] || info.thumburl || info.url, full: info.url };
                        }
                    }
                } catch {}
            }

            // 5. Fallback: pages with only pageimages thumb, no imageinfo
            for (const t of titles) {
                if (!result[t] && piThumbs[t]) {
                    result[t] = { thumb: piThumbs[t], full: piThumbs[t] };
                }
            }

            return result;
        }

        async function fetchPageExtra(titles) {
            if (titles.length === 0) return {};
            try {
                const params = new URLSearchParams({
                    action: "query",
                    prop: "categories",
                    cllimit: 5,
                    clshow: "!hidden",
                    titles: titles.join("|"),
                    format: "json",
                    origin: "*",
                });
                const resp = await fetchWithTimeout(`${API}?${params}`, {}, 8000);
                const data = await resp.json();
                const pages = data.query?.pages || {};
                const result = {};
                for (const p of Object.values(pages)) {
                    result[p.title] = {
                        categories: (p.categories || []).map(c => c.title.replace(/^分类:/, "")),
                    };
                }
                return result;
            } catch {
                return {};
            }
        }

        function renderPagination() {
            const totalPages = Math.ceil(totalHits / PAGE_SIZE);
            if (totalPages <= 1) {
                pagination.hidden = true;
                return;
            }
            pagination.hidden = false;

            const pages = [];
            const delta = 2;
            const start = Math.max(1, currentPage - delta);
            const end = Math.min(totalPages, currentPage + delta);

            if (start > 1) {
                pages.push(1);
                if (start > 2) pages.push("...");
            }
            for (let i = start; i <= end; i++) pages.push(i);
            if (end < totalPages) {
                if (end < totalPages - 1) pages.push("...");
                pages.push(totalPages);
            }

            pagination.innerHTML = `
                <button class="page-btn" ${currentPage <= 1 ? "disabled" : ""} data-page="${currentPage - 1}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                </button>
                ${pages.map(p =>
                    p === "..." ? `<span class="page-ellipsis">…</span>`
                    : `<button class="page-btn${p === currentPage ? " active" : ""}" data-page="${p}">${p}</button>`
                ).join("")}
                <button class="page-btn" ${currentPage >= totalPages ? "disabled" : ""} data-page="${currentPage + 1}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                </button>
            `;

            pagination.querySelectorAll(".page-btn:not([disabled])").forEach(btn => {
                btn.addEventListener("click", () => {
                    currentPage = parseInt(btn.dataset.page);
                    doSearch();
                    document.getElementById("results").scrollIntoView({ behavior: "smooth" });
                });
            });
        }

        // ── 工具函数 ──
        const _requestQueue = [];
        let _activeRequests = 0;
        const MAX_CONCURRENT = 3;
        const MIN_DELAY_MS = 150;
        let _lastRequestTime = 0;
        const _requestCache = new Map();
        const CACHE_TTL = 60000;

        function _cacheKey(url) {
            return url;
        }

        async function _processQueue() {
            if (_activeRequests >= MAX_CONCURRENT || _requestQueue.length === 0) return;
            _activeRequests++;
            const { fn, resolve, reject } = _requestQueue.shift();
            try {
                // Enforce minimum delay between requests
                const now = Date.now();
                const elapsed = now - _lastRequestTime;
                if (elapsed < MIN_DELAY_MS) {
                    await new Promise(r => setTimeout(r, MIN_DELAY_MS - elapsed + Math.random() * 100));
                }
                _lastRequestTime = Date.now();
                resolve(await fn());
            } catch (err) {
                reject(err);
            } finally {
                _activeRequests--;
                _processQueue();
            }
        }

        function enqueueRequest(fn) {
            return new Promise((resolve, reject) => {
                _requestQueue.push({ fn, resolve, reject });
                _processQueue();
            });
        }

        async function fetchWithTimeout(url, options = {}, timeoutMs = 10000) {
            const key = _cacheKey(url);
            const cached = _requestCache.get(key);
            if (cached && Date.now() - cached.time < CACHE_TTL) {
                return cached.resp.clone();
            }
            return enqueueRequest(async () => {
                let lastErr;
                for (let attempt = 0; attempt < 3; attempt++) {
                    if (attempt > 0) {
                        const backoff = Math.min(2000 * Math.pow(2, attempt - 1), 8000) + Math.random() * 500;
                        await new Promise(r => setTimeout(r, backoff));
                    }
                    const controller = new AbortController();
                    const timer = setTimeout(() => controller.abort(), timeoutMs);
                    try {
                        const resp = await fetch(url, {
                            ...options,
                            signal: controller.signal,
                            headers: {
                                "Accept": "application/json",
                                ...options.headers,
                            },
                        });
                        clearTimeout(timer);
                        // Rate limited — retry
                        if (resp.status === 429 || resp.status === 503) {
                            const retryAfter = resp.headers.get("Retry-After");
                            const wait = retryAfter ? parseInt(retryAfter) * 1000 : 0;
                            if (wait > 0 && wait < 15000) {
                                await new Promise(r => setTimeout(r, wait));
                            }
                            lastErr = new Error("请求频率受限，正在重试…");
                            continue;
                        }
                        if (!resp.ok) {
                            throw new Error(`服务器返回 ${resp.status} (${resp.statusText || "错误"})`);
                        }
                        _requestCache.set(key, { resp: resp.clone(), time: Date.now() });
                        return resp;
                    } catch (err) {
                        clearTimeout(timer);
                        if (err.name === "AbortError") throw err;
                        if (err.message.includes("fetch") || err.message.includes("Network") || err.message.includes("Load failed")) {
                            if (!navigator.onLine) throw new Error("网络已断开，请检查网络连接");
                            lastErr = new Error("无法连接到 Wiki 服务器，正在重试…");
                            continue;
                        }
                        throw err;
                    }
                }
                throw lastErr || new Error("请求失败，请稍后重试");
            });
        }

        // Periodic cache cleanup
        setInterval(() => {
            const now = Date.now();
            for (const [k, v] of _requestCache) {
                if (now - v.time > CACHE_TTL) _requestCache.delete(k);
            }
        }, 30000);

        const _escEl = document.createElement("div");
        function esc(str) {
            _escEl.textContent = str || "";
            return _escEl.innerHTML;
        }

        function truncate(str, len) {
            return str.length > len ? str.slice(0, len) + "…" : str;
        }

        function highlightMatch(text, q) {
            if (!q) return text;
            const words = q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&").split(/\s+/).filter(Boolean);
            if (words.length === 0) return text;
            const re = new RegExp(`(${words.join("|")})`, "gi");
            return text.replace(re, '<mark>$1</mark>');
        }

        function cleanSnippet(html) {
            const div = document.createElement("div");
            div.innerHTML = html;
            div.querySelectorAll(".searchmatch").forEach(el => {
                const mark = document.createElement("mark");
                mark.innerHTML = el.innerHTML;
                el.replaceWith(mark);
            });
            return div.innerHTML;
        }

        function skeletonHTML(count) {
            return Array.from({ length: count }, () => `
                <div class="result-card skeleton-card">
                    <div class="result-body">
                        <div class="skeleton-line" style="width: 40%; height: 18px;"></div>
                        <div class="skeleton-line" style="width: 100%; height: 14px; margin-top: 8px;"></div>
                        <div class="skeleton-line" style="width: 80%; height: 14px; margin-top: 4px;"></div>
                        <div class="skeleton-line" style="width: 30%; height: 12px; margin-top: 8px;"></div>
                    </div>
                </div>
            `).join("");
        }

        function emptyHTML(q, suggestion) {
            return `
                <div class="empty-state">
                    <div class="empty-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/><path d="m8 11 6 0"/></svg>
                    </div>
                    <p>未找到「${esc(q)}」相关结果</p>
                    ${suggestion ? `<p class="empty-hint">你是不是要搜：<button class="suggestion-link" data-title="${esc(suggestion)}">${esc(suggestion)}</button></p>` : '<p class="empty-hint">试试换个关键词，或检查拼写</p>'}
                </div>
            `;
        }

        function errorHTML(msg) {
            return `
                <div class="empty-state">
                    <div class="empty-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>
                    </div>
                    <p>${esc(msg)}</p>
                    <button class="btn outline" id="retryBtn" style="margin-top: 12px;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;margin-right:4px"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
                        重试
                    </button>
                </div>
            `;
        }

        // ── 事件绑定 ──
        input.addEventListener("input", () => {
            query = input.value;
            clearBtn.hidden = !query;
            clearTimeout(searchTimer);
            if (!query.trim()) {
                hideDropdown();
                return;
            }
            searchTimer = setTimeout(() => fetchSuggestions(query), DEBOUNCE_MS);
        });

        input.addEventListener("keydown", (e) => {
            const items = dropdown.querySelectorAll(".suggest-item");
            if (!dropdown.hidden && items.length > 0) {
                if (e.key === "ArrowDown") {
                    e.preventDefault();
                    setSuggestHighlight(Math.min(suggestIdx + 1, items.length - 1));
                    return;
                }
                if (e.key === "ArrowUp") {
                    e.preventDefault();
                    if (suggestIdx <= 0) {
                        suggestIdx = -1;
                        input.value = query;
                        items.forEach(el => el.classList.remove("highlighted"));
                    } else {
                        setSuggestHighlight(suggestIdx - 1);
                    }
                    return;
                }
            }
            if (e.key === "Enter") {
                e.preventDefault();
                hideDropdown();
                query = input.value;
                currentPage = 1;
                doSearch();
            }
            if (e.key === "Escape") {
                if (!dropdown.hidden) {
                    hideDropdown();
                    input.value = query;
                } else if (query) {
                    input.value = "";
                    query = "";
                    clearBtn.hidden = true;
                    results.innerHTML = placeholderHTML();
                    resultMeta.hidden = true;
                    pagination.hidden = true;
                }
            }
        });

        clearBtn.addEventListener("click", () => {
            input.value = "";
            query = "";
            clearBtn.hidden = true;
            hideDropdown();
            results.innerHTML = placeholderHTML();
            resultMeta.hidden = true;
            pagination.hidden = true;
            input.focus();
        });

        // Handle URL params
        const urlParams = new URLSearchParams(location.search);
        const urlQ = urlParams.get("q");
        if (urlQ) {
            input.value = urlQ;
            query = urlQ;
            clearBtn.hidden = false;
            doSearch();
        }

        // Init
        renderProfileChips();
        renderNSChips();
        renderSortChips();
        if (nsFilterGroup) nsFilterGroup.style.display = "none";

        // ── Lightbox ──
        const lightbox = document.getElementById("lightbox");
        const lightboxImg = document.getElementById("lightboxImg");
        const lightboxClose = document.getElementById("lightboxClose");
        const lightboxLoading = document.getElementById("lightboxLoading");
        const lightboxContainer = lightbox?.querySelector(".lightbox-container");

        let lbScale = 1;
        let lbTranslateX = 0;
        let lbTranslateY = 0;
        let lbDragging = false;
        let lbDragStartX = 0;
        let lbDragStartY = 0;
        let lbStartTranslateX = 0;
        let lbStartTranslateY = 0;
        let lbPinchDist = 0;
        let lbPinchScale = 1;
        let lbLastTap = 0;

        function lbUpdateTransform(smooth) {
            if (!lightboxImg) return;
            lightboxImg.style.transition = smooth ? "transform 0.3s cubic-bezier(0.16, 1, 0.3, 1)" : "";
            lightboxImg.style.transform = `translate(${lbTranslateX}px, ${lbTranslateY}px) scale(${lbScale})`;
        }

        function lbReset() {
            lbScale = 1;
            lbTranslateX = 0;
            lbTranslateY = 0;
            lightboxContainer?.classList.remove("zoomed");
            lbUpdateTransform(false);
        }

        function openLightbox(fullSrc) {
            if (!lightbox || !lightboxImg || !lightboxLoading) return;
            lightboxImg.src = "";
            lightbox.hidden = false;
            lightboxLoading.classList.remove("hidden");
            lbReset();

            const img = new Image();
            img.onload = () => {
                lightboxImg.src = fullSrc;
                lightboxLoading.classList.add("hidden");
            };
            img.onerror = () => {
                lightboxLoading.classList.add("hidden");
                lightboxImg.src = fullSrc;
            };
            img.src = fullSrc;

            requestAnimationFrame(() => lightbox.classList.add("open"));
            document.body.style.overflow = "hidden";
        }

        function closeLightbox() {
            if (!lightbox) return;
            lightbox.classList.remove("open");
            setTimeout(() => {
                lightbox.hidden = true;
                if (lightboxImg) lightboxImg.src = "";
                document.body.style.overflow = "";
            }, 250);
        }

        function lbToggleZoom(clientX, clientY) {
            if (lbScale > 1.05) {
                lbReset();
                lbUpdateTransform(true);
            } else {
                if (!lightboxContainer) return;
                const rect = lightboxContainer.getBoundingClientRect();
                const cx = clientX - rect.left - rect.width / 2;
                const cy = clientY - rect.top - rect.height / 2;
                const targetScale = 2.5;
                const ratio = targetScale;
                lbScale = targetScale;
                lbTranslateX = cx - ratio * (cx - lbTranslateX);
                lbTranslateY = cy - ratio * (cy - lbTranslateY);
                lightboxContainer.classList.add("zoomed");
                lbUpdateTransform(true);
            }
        }

        // Click thumb to open
        document.addEventListener("click", (e) => {
            const thumb = e.target.closest(".result-thumb");
            if (thumb) {
                e.preventDefault();
                e.stopPropagation();
                const fullSrc = thumb.dataset.full;
                if (fullSrc) openLightbox(fullSrc);
            }
        });

        // Close
        lightboxClose?.addEventListener("click", closeLightbox);
        lightbox?.querySelector(".lightbox-backdrop")?.addEventListener("click", closeLightbox);
        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape" && lightbox && !lightbox.hidden) closeLightbox();
        });

        // Double-click / double-tap to toggle zoom
        lightboxContainer?.addEventListener("dblclick", (e) => {
            e.preventDefault();
            lbToggleZoom(e.clientX, e.clientY);
        });

        // Wheel zoom
        lightboxContainer?.addEventListener("wheel", (e) => {
            e.preventDefault();
            if (!lightboxContainer) return;
            const rect = lightboxContainer.getBoundingClientRect();
            const mouseX = e.clientX - rect.left - rect.width / 2;
            const mouseY = e.clientY - rect.top - rect.height / 2;

            const oldScale = lbScale;
            const delta = e.deltaY > 0 ? 0.92 : 1.08;
            lbScale = Math.max(0.5, Math.min(15, lbScale * delta));

            if (lbScale < 1.05 && oldScale >= 1.05) {
                lbReset();
                lbUpdateTransform(true);
                return;
            }

            const ratio = lbScale / oldScale;
            lbTranslateX = mouseX - ratio * (mouseX - lbTranslateX);
            lbTranslateY = mouseY - ratio * (mouseY - lbTranslateY);

            lightboxContainer.classList.toggle("zoomed", lbScale > 1.05);
            lbUpdateTransform(false);
        }, { passive: false });

        // Mouse drag
        lightboxContainer?.addEventListener("mousedown", (e) => {
            if (e.button !== 0 || lbScale <= 1.05) return;
            lbDragging = true;
            lightboxContainer?.classList.add("dragging");
            lbDragStartX = e.clientX;
            lbDragStartY = e.clientY;
            lbStartTranslateX = lbTranslateX;
            lbStartTranslateY = lbTranslateY;
        });

        document.addEventListener("mousemove", (e) => {
            if (!lbDragging) return;
            lbTranslateX = lbStartTranslateX + (e.clientX - lbDragStartX);
            lbTranslateY = lbStartTranslateY + (e.clientY - lbDragStartY);
            lbUpdateTransform(false);
        });

        document.addEventListener("mouseup", () => {
            lbDragging = false;
            lightboxContainer?.classList.remove("dragging");
        });

        // Touch: double-tap, pinch zoom, drag
        let lbTouchCount = 0;
        let lbTouchStart = 0;

        lightboxContainer?.addEventListener("touchstart", (e) => {
            e.preventDefault();
            lbTouchCount = e.touches.length;

            if (e.touches.length === 1) {
                const now = Date.now();
                if (now - lbLastTap < 300) {
                    lbToggleZoom(e.touches[0].clientX, e.touches[0].clientY);
                    lbLastTap = 0;
                    return;
                }
                lbLastTap = now;
                lbTouchStart = now;

                if (lbScale > 1.05) {
                    lbDragging = true;
                    lightboxContainer?.classList.add("dragging");
                    lbDragStartX = e.touches[0].clientX;
                    lbDragStartY = e.touches[0].clientY;
                    lbStartTranslateX = lbTranslateX;
                    lbStartTranslateY = lbTranslateY;
                }
            } else if (e.touches.length === 2) {
                lbDragging = false;
                lightboxContainer?.classList.remove("dragging");
                lightboxContainer?.classList.add("pinch");
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                lbPinchDist = Math.hypot(dx, dy);
                lbPinchScale = lbScale;
            }
        }, { passive: false });

        lightboxContainer?.addEventListener("touchmove", (e) => {
            e.preventDefault();
            if (e.touches.length === 1 && lbDragging) {
                lbTranslateX = lbStartTranslateX + (e.touches[0].clientX - lbDragStartX);
                lbTranslateY = lbStartTranslateY + (e.touches[0].clientY - lbDragStartY);
                lbUpdateTransform(false);
            } else if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const dist = Math.hypot(dx, dy);
                const scale = (dist / lbPinchDist) * lbPinchScale;
                lbScale = Math.max(0.5, Math.min(15, scale));
                lightboxContainer?.classList.toggle("zoomed", lbScale > 1.05);
                lbUpdateTransform(false);
            }
        }, { passive: false });

        lightboxContainer?.addEventListener("touchend", (e) => {
            lbTouchCount = e.touches.length;
            lightboxContainer?.classList.remove("pinch");
            if (lbTouchCount === 0) {
                lbDragging = false;
                lightboxContainer?.classList.remove("dragging");
            } else if (lbTouchCount === 1 && lbScale > 1.05) {
                lbDragging = true;
                lightboxContainer?.classList.add("dragging");
                lbDragStartX = e.touches[0].clientX;
                lbDragStartY = e.touches[0].clientY;
                lbStartTranslateX = lbTranslateX;
                lbStartTranslateY = lbTranslateY;
            }
        });

        function placeholderHTML() {
            return `
                <div class="placeholder">
                    <div class="placeholder-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    </div>
                    <p>输入关键词开始搜索卡拉彼丘 Wiki</p>
                </div>
            `;
        }
    })();
    </script>
</body>
